<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Payment Retry Service</title>
	<style>
		:root {
			--bg: #f5f7fb;
			--card: #ffffff;
			--text: #1f2a37;
			--accent: #1463ff;
			--muted: #6b7280;
			--ok: #0f8a41;
			--bad: #b42318;
		}
		* { box-sizing: border-box; }
		body {
			margin: 0;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			color: var(--text);
			background: linear-gradient(120deg, #eef2ff 0%, var(--bg) 40%, #e6fffb 100%);
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 24px;
		}
		.card {
			width: 100%;
			max-width: 520px;
			background: var(--card);
			border-radius: 16px;
			box-shadow: 0 10px 30px rgba(13, 27, 58, 0.12);
			padding: 24px;
		}
		h1 { margin: 0 0 8px; font-size: 1.5rem; }
		p { margin: 0 0 20px; color: var(--muted); }
		label { font-weight: 600; display: block; margin-bottom: 8px; }
		input {
			width: 100%;
			padding: 12px;
			border: 1px solid #d0d5dd;
			border-radius: 10px;
			font-size: 16px;
		}
		button {
			margin-top: 14px;
			width: 100%;
			border: none;
			border-radius: 10px;
			background: var(--accent);
			color: white;
			padding: 12px;
			font-size: 16px;
			font-weight: 600;
			cursor: pointer;
		}
		pre {
			margin-top: 16px;
			background: #0b1220;
			color: #d1f5e5;
			border-radius: 10px;
			padding: 14px;
			overflow: auto;
			min-height: 90px;
		}
		.ok { color: var(--ok); }
		.bad { color: var(--bad); }
	</style>
</head>
<body>
	<main class="card">
		<h1>Payment Request</h1>
		<p>Submit a simple POST request to the service.</p>
		<label for="amount">Amount</label>
		<input id="amount" type="number" min="0.01" step="0.01" value="49.99">
		<button id="send">Send Payment</button>
		<pre id="result">Waiting for request...</pre>
	</main>

	<script>
		const btn = document.getElementById('send');
		const amountEl = document.getElementById('amount');
		const resultEl = document.getElementById('result');

		btn.addEventListener('click', async () => {
			const amount = Number(amountEl.value);
			if (!amount || amount <= 0) {
				resultEl.textContent = 'Enter a valid amount greater than 0.';
				return;
			}

			resultEl.textContent = 'Sending request...';

			try {
				const res = await fetch('/api/payments', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ amount })
				});

				const data = await res.json();
				resultEl.textContent = JSON.stringify(data, null, 2);
			} catch (err) {
				resultEl.textContent = 'Request failed: ' + err.message;
			}
		});
	</script>
</body>
</html>
